{% extends 'base.html' %}
{% block title %}Nueva Categoría — Gestor{% endblock %}

{% block contenido %}
<div class="container py-4" style="max-width:600px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 style="font-family:'Fredoka One',cursive;color:#993556;">
      ➕ Nueva Categoría
    </h2>
    <a href="{% url 'gestor_lista_categorias' %}" class="btn btn-ls-outline">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>

  <div class="ls-form-card">
    <div class="ls-form-header">
      <h5 class="mb-0"><i class="bi bi-folder-plus me-2"></i>Datos de la categoría</h5>
    </div>
    <div class="p-4">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-8">
            <label class="form-label fw-semibold small">Nombre *</label>
            <input type="text" name="nombre" class="form-control ls-input"
                   placeholder="Ej: Ortodoncia" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold small">Orden</label>
            <input type="number" name="orden" class="form-control ls-input"
                   value="0" min="0">
            <div class="form-text">Menor número aparece primero</div>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold small">Descripción</label>
            <textarea name="descripcion" class="form-control ls-input" rows="3"
                      placeholder="Ej: Productos para pacientes con brackets…"></textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Ícono Bootstrap</label>
            <input type="text" name="icono" class="form-control ls-input"
                   placeholder="Ej: bi-heart" value="bi-box">
            <div class="form-text">
              Ver íconos en <a href="https://icons.getbootstrap.com" target="_blank">icons.getbootstrap.com</a>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-check mt-4">
              <input class="form-check-input" type="checkbox" name="activo"
                     id="activo" checked>
              <label class="form-check-label" for="activo">Categoría activa</label>
            </div>
          </div>
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-ls">
            <i class="bi bi-check-circle me-2"></i>Crear categoría
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

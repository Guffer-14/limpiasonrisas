{% extends 'base.html' %}
{% block title %}Email enviado{% endblock %}

{% block contenido %}
<div class="ls-auth-page py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <div style="font-size:4rem;">📧</div>
          <p style="font-family:'Fredoka One',cursive; font-size:1.5rem; color:#993556;">¡Email enviado!</p>
        </div>
        <div class="ls-form-card">
          <div class="ls-form-body text-center">
            <p class="text-muted">Revisa tu bandeja de entrada y sigue el link para recuperar tu contraseña.</p>
            <a href="{% url 'login' %}" class="btn btn-ls mt-2">
              <i class="bi bi-box-arrow-in-right me-2"></i>Volver al login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

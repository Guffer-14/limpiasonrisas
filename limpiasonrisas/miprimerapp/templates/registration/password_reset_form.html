{% extends 'base.html' %}
{% block title %}Recuperar contraseña{% endblock %}

{% block contenido %}
<div class="ls-auth-page py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <div style="font-size:4rem;">🔑</div>
          <p style="font-family:'Fredoka One',cursive; font-size:1.5rem; color:#993556;">Recuperar contraseña</p>
        </div>
        <div class="ls-form-card">
          <div class="ls-form-header">
            <h3>¿Olvidaste tu contraseña?</h3>
          </div>
          <div class="ls-form-body">
            <p class="text-muted small mb-3">Ingresa tu email y te enviaremos un link para recuperarla.</p>
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control ls-input"
                       placeholder="correo@ejemplo.com" required autofocus>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-ls btn-lg">
                  <i class="bi bi-envelope me-2"></i>Enviar link
                </button>
              </div>
            </form>
            <p class="text-center mt-4 mb-0">
              <a href="{% url 'login' %}" style="color:#993556;">← Volver al login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Iniciar sesión{% endblock %}

{% block contenido %}
<div class="ls-auth-page py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <div style="font-size:4rem;">😁</div>
          <p style="font-family:'Fredoka One',cursive; font-size:1.5rem; color:#993556;">Limpia Sonrisas</p>
        </div>
        <div class="ls-form-card">
          <div class="ls-form-header">
            <h3>Iniciar sesión</h3>
          </div>
          <div class="ls-form-body">
            {% if form.errors %}
            <div class="alert ls-alert alert-danger">
              <i class="bi bi-exclamation-triangle me-2"></i>
              Usuario o contraseña incorrectos.
            </div>
            {% endif %}
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control ls-input" placeholder="Tu nombre de usuario"
                  autofocus required>
              </div>
              <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <div style="position:relative;">
                  <input type="password" name="password" id="password-login" class="form-control ls-input"
                    placeholder="••••••••" required style="padding-right:40px;">
                  <button type="button" onclick="togglePassword()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);
                   background:none;border:none;color:#993556;cursor:pointer;padding:0;">
                    <i class="bi bi-eye" id="ojo-icon" style="font-size:1rem;"></i>
                  </button>
                </div>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-ls btn-lg">
                  <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
              </div>
            </form>
            <p class="text-center mt-4 mb-0">
              <a href="{% url 'password_reset' %}" style="color:#993556; font-size:.9rem;">
                ¿Olvidaste tu contraseña?
              </a>
            </p>
            <p class="text-center mt-2 mb-0 text-muted">
              ¿No tienes cuenta?
              <a href="{% url 'registro' %}" style="color:#993556; font-weight:700;">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function togglePassword() {
    const input = document.getElementById('password-login');
    const icon = document.getElementById('ojo-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>

{% endblock %}

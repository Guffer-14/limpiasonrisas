{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}

{% block contenido %}
<div class="container py-4" style="max-width:600px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 style="font-family:'Fredoka One',cursive;color:#993556;">
      ✏️ Editar Usuario
    </h2>
    <a href="{% url 'adm_lista_usuarios' %}" class="btn btn-ls-outline">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
  </div>

  <div class="ls-form-card">
    <div class="ls-form-header">
      <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>{{ usuario.username }}</h5>
    </div>
    <div class="p-4">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Nombre</label>
            <input type="text" name="first_name" class="form-control ls-input"
                   value="{{ usuario.first_name }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Apellido</label>
            <input type="text" name="last_name" class="form-control ls-input"
                   value="{{ usuario.last_name }}">
          </div>
          <div class="col-md-12">
            <label class="form-label fw-semibold small">Email</label>
            <input type="email" name="email" class="form-control ls-input"
                   value="{{ usuario.email }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Grupo</label>
            <select name="grupo" class="form-select ls-input">
              <option value="">-- Sin grupo --</option>
              {% for g in grupos %}
              <option value="{{ g.id }}"
                {% if usuario.groups.all.0.id == g.id %}selected{% endif %}>
                {{ g.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold small">Estado</label>
            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" name="is_active"
                     id="is_active" {% if usuario.is_active %}checked{% endif %}>
              <label class="form-check-label" for="is_active">Usuario activo</label>
            </div>
          </div>
        </div>
        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-ls">
            <i class="bi bi-check-circle me-2"></i>Guardar cambios
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
